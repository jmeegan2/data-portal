apiVersion: apps/v1
kind: Deployment
metadata:
  name: vscode
  labels:
    app: vscode
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vscode
  template:
    metadata:
      labels:
        app: vscode
    spec:
      securityContext:
        runAsUser: 911
        runAsGroup: 1001
      initContainers:
        - name: fix-permissions
          image: jmeegan607/data-portal-vscode:latest
          command: ["sh", "-c", "chown -R 911:1001 /config"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: vscode-data
              mountPath: /config
      containers:
        - name: vscode
          image: jmeegan607/data-portal-vscode:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8080
          command: ["/app/code-server/bin/code-server"]
          args: ["--auth", "none", "--bind-addr", "0.0.0.0:8080", "/config"]
          env:
            - name: HOME
              value: "/config"
          envFrom:
            - configMapRef:
                name: dart-db-config
            - secretRef:
                name: dart-db-secret
          volumeMounts:
            - name: vscode-data
              mountPath: /config
            - name: test-scripts
              mountPath: /config/test_db_connection.py
              subPath: test_db_connection.py
      volumes:
        - name: vscode-data
          persistentVolumeClaim:
            claimName: vscode-pvc
        - name: test-scripts
          configMap:
            name: test-scripts
