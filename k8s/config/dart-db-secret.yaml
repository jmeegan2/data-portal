apiVersion: v1                     # Secrets use the core API
kind: Secret                       # like a ConfigMap but for sensitive data
metadata:
  name: dart-db-secret             # name you reference from Deployments
type: Opaque                       # generic secret type (as opposed to TLS certs, docker registry creds, etc.)
stringData:                        # stringData lets you write plain text — K8s base64-encodes it automatically
  DB_PASSWORD: "DART"
