<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Data Environment Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0e0;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      letter-spacing: 0.03em;
    }

    p {
      font-size: 0.95rem;
      color: #888;
      margin-bottom: 3rem;
    }

    .cards {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 2.5rem 3rem;
      text-align: center;
      text-decoration: none;
      color: inherit;
      width: 220px;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover {
      border-color: #5b8dee;
      transform: translateY(-4px);
    }

    .card .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .card .label {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .card .desc {
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.4rem;
    }
  </style>
</head>
<body>
  <h1>Data Environment Portal</h1>
  <p>Choose your environment to get started</p>

  <div class="cards">
    <a class="card" href="/rstudio/">
      <div class="icon">📊</div>
      <div class="label">RStudio</div>
      <div class="desc">R-based analysis &amp; visualization</div>
    </a>
    <a class="card" href="/rstudio-copy/">
      <div class="icon">📋</div>
      <div class="label">RStudio Copy</div>
      <div class="desc">Copy of R environment</div>
    </a>
    <a class="card" href="/vscode/">
      <div class="icon">💻</div>
      <div class="label">Python Env</div>
      <div class="desc">VS Code in the browser</div>
    </a>
  </div>
</body>
</html>
