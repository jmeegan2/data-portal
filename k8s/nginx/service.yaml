apiVersion: v1                             # core API for Services
kind: Service                              # gives pods a stable DNS name and endpoint
metadata:
  name: nginx                              # other pods reach this as http://nginx:8080
  labels:
    app: nginx
spec:
  selector:
    app: nginx                             # routes traffic to pods with this label
  ports:
    - port: 8080                           # port the service listens on
      targetPort: 8080                     # port on the container to forward to
      protocol: TCP
