apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: portal-html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: htpasswd
              mountPath: /etc/nginx/.htpasswd
              subPath: .htpasswd
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: portal-html
          configMap:
            name: portal-html
        - name: htpasswd
          secret:
            secretName: nginx-htpasswd
