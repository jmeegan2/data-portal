apiVersion: kustomize.config.k8s.io/v1beta1  # Kustomize API (used by both kubectl and Flux)
kind: Kustomization                          # defines how to assemble all the K8s manifests

# ConfigMaps generated from literals and files — Kustomize auto-appends a hash suffix
# so changes trigger pod restarts automatically.
configMapGenerator:
  - name: dart-db-config                     # DB connection details (non-sensitive)
    literals:
      - DB_HOST=host.docker.internal         # TODO: replace with RDS endpoint in NGSC
      - DB_PORT=5551
      - DB_NAME=dart
      - DB_USER=dart
  - name: nginx-config                       # reverse proxy config (default.conf)
    files:
      - default.conf=nginx/default.conf
  - name: portal-html                        # landing page HTML
    files:
      - index.html=nginx/index.html

# All the manifests Kustomize should include
resources:
  - config/dart-db-secret.yaml
  - config/test-scripts-configmap.yaml
  - nginx/deployment.yaml
  - nginx/service.yaml
  - nginx/htpasswd-secret.yaml
  - rstudio/pvc.yaml
  - rstudio/deployment.yaml
  - rstudio/service.yaml
  - vscode/pvc.yaml
  - vscode/deployment.yaml
  - vscode/service.yaml
