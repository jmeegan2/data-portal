apiVersion: apps/v1                        # standard API for Deployments
kind: Deployment
metadata:
  name: rstudio
  labels:
    app: rstudio
spec:
  replicas: 1                              # one RStudio instance
  selector:
    matchLabels:
      app: rstudio
  template:
    metadata:
      labels:
        app: rstudio
    spec:
      securityContext:
        runAsUser: 1000                    # UID 1000 = rstudio user in the rocker image
        runAsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: rstudio
          image: jmeegan607/data-portal-rstudio:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8787          # RStudio Server's default port
          # Skips rocker's /init entrypoint (requires root) and runs rserver directly.
          # Line 1: writes DB env vars into R's config so R sessions can read them.
          # Line 2: starts rserver as non-root with no auth (nginx handles auth).
          # Init container won't work here — Renviron.site must be written in the
          # same filesystem where rserver runs (emptyDir would hide existing R configs).
          command: ["/bin/bash", "-c"]
          args:
            - |
              env | grep '^DB_' >> /usr/local/lib/R/etc/Renviron.site
              exec rserver --auth-none=1 --server-user=rstudio --server-daemonize=0
          env:
            - name: USER                   # required by rocker base image
              value: rstudio
            - name: PASSWORD               # required by rocker base image (unused since auth is off)
              value: rstudio
          envFrom:
            - configMapRef:
                name: dart-db-config       # DB_HOST, DB_PORT, DB_NAME, DB_USER
            - secretRef:
                name: dart-db-secret       # DB_PASSWORD
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: rstudio-data           # persistent storage for user files
              mountPath: /home/rstudio
            - name: test-scripts           # pre-loaded DB connection test script
              mountPath: /home/rstudio/test_db_connection.R
              subPath: test_db_connection.R
            - name: run                    # writable dir for rserver PID/socket files
              mountPath: /run
            - name: var-lib-rstudio-server # writable dir for SQLite session state
              mountPath: /var/lib/rstudio-server
            - name: tmp                    # writable dir for R temp files (Rtmp*)
              mountPath: /tmp
      volumes:
        - name: rstudio-data               # persists across pod restarts
          persistentVolumeClaim:
            claimName: rstudio-pvc
        - name: test-scripts
          configMap:
            name: test-scripts
        # Required: non-root rstudio user can't write to these dirs without emptyDir mounts.
        # /run — rserver PID files and socket
        # /var/lib/rstudio-server — SQLite session state DB
        # /tmp — R session temp files (Rtmp*)
        # Removing these will crash rserver with permission denied errors.
        - name: run
          emptyDir: {}
        - name: var-lib-rstudio-server
          emptyDir: {}
        - name: tmp
          emptyDir: {}
