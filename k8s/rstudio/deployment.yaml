apiVersion: apps/v1
kind: Deployment
metadata:
  name: rstudio
  labels:
    app: rstudio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rstudio
  template:
    metadata:
      labels:
        app: rstudio
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: rstudio
          image: jmeegan607/data-portal-rstudio:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8787
          # Skips rocker's /init entrypoint (requires root) and runs rserver directly.
          # Line 1: writes DB env vars into R's config so R sessions can read them.
          # Line 2: starts rserver as non-root with no auth (nginx handles auth).
          # Init container won't work here — Renviron.site must be written in the
          # same filesystem where rserver runs (emptyDir would hide existing R configs).
          command: ["/bin/bash", "-c"]
          args:
            - |
              env | grep '^DB_' >> /usr/local/lib/R/etc/Renviron.site
              exec rserver --auth-none=1 --server-user=rstudio --server-daemonize=0
          env:
            - name: USER
              value: rstudio
            - name: PASSWORD
              value: rstudio
          envFrom:
            - configMapRef:
                name: dart-db-config
            - secretRef:
                name: dart-db-secret
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: rstudio-data
              mountPath: /home/rstudio
            - name: test-scripts
              mountPath: /home/rstudio/test_db_connection.R
              subPath: test_db_connection.R
            - name: run
              mountPath: /run
            - name: var-lib-rstudio-server
              mountPath: /var/lib/rstudio-server
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: rstudio-data
          persistentVolumeClaim:
            claimName: rstudio-pvc
        - name: test-scripts
          configMap:
            name: test-scripts
        # Required: non-root rstudio user can't write to these dirs without emptyDir mounts.
        # /run — rserver PID files and socket
        # /var/lib/rstudio-server — SQLite session state DB
        # /tmp — R session temp files (Rtmp*)
        # Removing these will crash rserver with permission denied errors.
        - name: run
          emptyDir: {}
        - name: var-lib-rstudio-server
          emptyDir: {}
        - name: tmp
          emptyDir: {}
