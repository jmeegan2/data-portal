apiVersion: apps/v1                # K8s API version for Deployments
kind: Deployment                   # manages pods — restarts them if they crash
metadata:
  name: rstudio                    # name of this deployment
  labels:
    app: rstudio                   # label for organizing resources
spec:
  replicas: 1                      # run one instance of the pod
  selector:
    matchLabels:
      app: rstudio                 # tells the deployment which pods it owns
  template:                        # pod template — defines what each pod looks like
    metadata:
      labels:
        app: rstudio               # pods get this label so the Service can find them
    spec:
      containers:
        - name: rstudio                        # container name
          image: jmeegan607/data-portal-rstudio:latest  # custom image with RPostgres pre-installed
          imagePullPolicy: IfNotPresent                # pull from Docker Hub if not already on node
          ports:
            - containerPort: 8787              # RStudio listens on this port
          env:
            - name: DISABLE_AUTH
              value: "true"                    # skip RStudio login — auth handled externally
            - name: ROOT
              value: "true"                    # give rstudio user root access inside container
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: dart-db-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: dart-db-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: dart-db-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: dart-db-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dart-db-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: rstudio-data
              mountPath: /home/rstudio         # persist the RStudio user's home directory
            - name: test-scripts
              mountPath: /home/rstudio/test_db_connection.R
              subPath: test_db_connection.R    # mount single file into the PVC directory
          resources:
            requests:                          # minimum resources guaranteed to this container
              memory: "512Mi"
              cpu: "250m"
            limits:                            # maximum resources this container can use
              memory: "2Gi"
              cpu: "1"
      volumes:
        - name: rstudio-data
          persistentVolumeClaim:
            claimName: rstudio-pvc             # references the PVC defined in rstudio-pvc.yaml
        - name: test-scripts
          configMap:
            name: test-scripts                 # references the ConfigMap with test scripts
