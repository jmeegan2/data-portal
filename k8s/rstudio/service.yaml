apiVersion: v1                     # K8s API version for Services
kind: Service                      # exposes pods to the network — gives them a stable endpoint
metadata:
  name: rstudio                    # service name — also becomes the internal DNS name
  labels:
    app: rstudio
spec:
  selector:
    app: rstudio                   # routes traffic to pods with this label
  ports:
    - port: 8787                   # port the service listens on
      targetPort: 8787             # port on the container to forward to
      protocol: TCP
